<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proon AI Backend</title>
    <style>
      :root {
        --sky: #cfe9ff;
        --sky-dark: #8fbfe6;
        --text: #0b1b2b;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--sky);
        color: var(--text);
        font-family: "Georgia", "Times New Roman", serif;
      }
      .card {
        background: #ffffff;
        border: 2px solid var(--sky-dark);
        border-radius: 12px;
        padding: 28px 32px;
        max-width: 560px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(11, 27, 43, 0.12);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 26px;
      }
      p {
        margin: 6px 0 0;
        font-size: 16px;
        line-height: 1.5;
      }
      a {
        color: #0b4f8a;
        text-decoration: none;
        font-weight: 700;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome to the Backend Base Route</h1>
      <p>
        Go to the dashboard:
        <a href="https://prooning.com/admin">https://prooning.com/admin</a>
      </p>
    </div>
  </body>
</html>

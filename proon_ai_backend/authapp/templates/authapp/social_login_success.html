<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Sign-In Success</title>
    <style>
        :root {
            --bg-start: #f2f7ff;
            --bg-end: #e6fff2;
            --card: #ffffff;
            --text: #1f2a37;
            --muted: #5d6b7a;
            --accent: #0f9d58;
            --border: #dce6f2;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top left, var(--bg-start), transparent 45%),
                        radial-gradient(circle at bottom right, var(--bg-end), transparent 45%),
                        #f7fafc;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 18px 45px rgba(18, 38, 63, 0.08);
            text-align: center;
        }

        .badge {
            width: 52px;
            height: 52px;
            margin: 0 auto 16px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: rgba(15, 157, 88, 0.12);
            color: var(--accent);
            font-size: 28px;
            font-weight: 700;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            line-height: 1.3;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
            font-size: 0.98rem;
        }

        .hint {
            margin-top: 14px;
            font-size: 0.9rem;
        }

        @media (max-width: 560px) {
            .card {
                border-radius: 14px;
                padding: 22px 18px;
            }

            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <main class="card" role="status" aria-live="polite">
        <div class="badge" aria-hidden="true">✓</div>
        <h1>Google sign-in successful</h1>
        <p>You can close this tab and return to the app.</p>
        <p class="hint">If the app does not continue automatically, switch back to your app window.</p>
    </main>
</body>
</html>

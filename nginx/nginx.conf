user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    merge_slashes on;

    server {
        listen 80;
        server_name prooning.com www.prooning.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name prooning.com www.prooning.com;

        ssl_certificate /etc/letsencrypt/live/prooning.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prooning.com/privkey.pem;

        client_max_body_size 200m;

        location /static/ {
            alias /staticfiles/;
            access_log off;
            expires 30d;
        }

        location /media/ {
            alias /media/;
            gzip off;

            location ~* \.tflite$ {
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }

        location / {
            # Collapse double (or more) leading slashes into a single slash.
            # Fixes mobile clients that accidentally send //api/... paths.
            rewrite ^//+(.*) /$1 permanent;

            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

services:
  web:
    build: ./proon_ai_backend
    user: "0:0"
    env_file:
      - ./proon_ai_backend/.env
    depends_on:
      - db
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    restart: unless-stopped
    command: gunicorn proon_ai_backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120

  db:
    image: postgres:16-alpine
    env_file:
      - ./proon_ai_backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - staticfiles:/staticfiles
      - media:/media
    restart: unless-stopped

  certbot:
    image: certbot/certbot:v2.10.0
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: ["certbot", "renew", "--webroot", "-w", "/var/www/certbot"]

volumes:
  postgres_data:
  staticfiles:
  media:
